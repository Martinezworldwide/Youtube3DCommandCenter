<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>YouTube Command Center - Web Demo</title>
    <meta name="description" content="3D visualization of YouTube channels - Try the free web demo!">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #1E1E1E;
        perspective: 2000px;
        perspective-origin: 50% 50%;
        font-family: Arial, sans-serif;
        color: white;
      }
      
      #display-container {
        position: fixed;
        width: 100vw;
        height: 100vh;
        transform-style: preserve-3d;
      }
      
      .channel-display {
        position: absolute;
        transform-style: preserve-3d;
        pointer-events: auto;
      }

      .channel-display-inner {
        transition: transform 0.3s ease;
      }

      .channel-display:hover .channel-display-inner {
        transform: scale(1.05);
      }

      .channel-placeholder,
      .channel-player-host {
        width: 1280px;
        height: 720px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        background: #000;
      }

      .channel-placeholder {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .placeholder-content {
        text-align: center;
        padding: 20px;
      }

      .placeholder-message {
        margin-top: 20px;
        max-width: 420px;
        line-height: 1.4;
      }

      .retry-button,
      .open-channel-button,
      .open-channel-link {
        margin-top: 12px;
        background: #FF0000;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 8px 14px;
        cursor: pointer;
        font-weight: bold;
      }

      .open-channel-button {
        margin-left: 8px;
        background: #333;
      }

      .open-channel-link {
        display: inline-block;
        margin-top: 8px;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.45);
      }

      .channel-player-host {
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      .channel-player-host.loaded {
        opacity: 1;
      }

      .channel-player-host iframe {
        border: none;
        border-radius: 10px;
        width: 1280px;
        height: 720px;
        background: #000;
      }
      
      .channel-label {
        position: absolute;
        top: -90px;
        width: 100%;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        pointer-events: auto;
      }

      .channel-subscribers {
        font-size: 16px;
        opacity: 0.8;
        margin-top: 5px;
      }

      .channel-info {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border-radius: 10px;
        margin-top: 20px;
        width: 300px;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      .channel-info.visible {
        opacity: 1;
      }

      .channel-info-title {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .channel-info-body {
        font-size: 14px;
        opacity: 0.8;
      }

      .channel-info-tip {
        margin-top: 10px;
      }
      
      #ui-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1000;
      }
      
      #controls {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border-radius: 10px;
        pointer-events: auto;
      }
      
      #premium-button {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #FF0000;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        pointer-events: auto;
        transition: transform 0.2s ease;
      }
      
      #premium-button:hover {
        transform: scale(1.1);
      }
      
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1E1E1E;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        transition: opacity 0.5s ease;
      }
      
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #333;
        border-top-color: #FF0000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .key {
        background: #333;
        padding: 2px 8px;
        border-radius: 4px;
        margin: 0 2px;
      }
      
      #tutorial {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        pointer-events: auto;
      }
      
      #tutorial.hidden {
        display: none;
      }

      #viewport-hint {
        position: absolute;
        top: 80px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="spinner"></div>
      <h2>Loading YouTube Command Center</h2>
      <p>Preparing your 3D experience...</p>
    </div>
    
    <div id="display-container"></div>
    
    <div id="ui-container">
      <div id="controls">
        <h2>Controls</h2>
        <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> - Move</p>
        <p><span class="key">Q</span><span class="key">E</span> - Rotate</p>
        <p><span class="key">Space</span> - Up</p>
        <p><span class="key">Shift</span> - Down</p>
        <p><span class="key">Mouse</span> - Look (drag on empty space)</p>
      </div>

      <div id="viewport-hint">Click and drag the background to look around</div>
      
      <button id="premium-button" onclick="window.open('https://yourwebsite.com/premium', '_blank')">
        Try Premium Version
      </button>
      
      <div id="tutorial">
        Walk up to a channel screen and use the player controls to watch inside the app.
        <br>
        <button onclick="this.parentElement.classList.add('hidden')" style="margin-top: 10px">Got it!</button>
      </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/channels.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const loadingScreen = document.getElementById('loading-screen');
        
        let cameraX = 0;
        let cameraY = 0;
        let cameraZ = 0;
        let rotationY = 0;
        let rotationX = 0;
        const moveSpeed = 50;
        const rotateSpeed = 2;
        const mouseLookSpeed = 0.15;
        const keys = {};
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        
        const container = document.getElementById('display-container');
        if (!container) {
          console.error('Display container not found!');
          return;
        }
        
        document.addEventListener('keydown', (event) => {
          keys[event.code] = true;
        });

        document.addEventListener('keyup', (event) => {
          keys[event.code] = false;
        });

        document.addEventListener('mousedown', (event) => {
          // Only start camera drag when clicking outside embedded players and UI controls
          if (event.target.closest('.channel-display') || event.target.closest('#ui-container')) {
            return;
          }

          isDragging = true;
          lastMouseX = event.clientX;
          lastMouseY = event.clientY;
        });

        document.addEventListener('mouseup', () => {
          isDragging = false;
        });

        document.addEventListener('mouseleave', () => {
          isDragging = false;
        });

        document.addEventListener('mousemove', (event) => {
          if (!isDragging) {
            return;
          }

          const deltaX = event.clientX - lastMouseX;
          const deltaY = event.clientY - lastMouseY;
          rotationY += deltaX * mouseLookSpeed;
          rotationX = Math.max(-30, Math.min(30, rotationX - deltaY * mouseLookSpeed));
          lastMouseX = event.clientX;
          lastMouseY = event.clientY;
        });
        
        function updateCamera() {
          if (keys['KeyW'] || keys['KeyS']) {
            const multiplier = keys['KeyW'] ? 1 : -1;
            cameraZ += Math.cos(rotationY * Math.PI / 180) * moveSpeed * multiplier;
            cameraX += Math.sin(rotationY * Math.PI / 180) * moveSpeed * multiplier;
          }
          
          if (keys['KeyA'] || keys['KeyD']) {
            const multiplier = keys['KeyD'] ? 1 : -1;
            cameraX += Math.cos(rotationY * Math.PI / 180) * moveSpeed * multiplier;
            cameraZ -= Math.sin(rotationY * Math.PI / 180) * moveSpeed * multiplier;
          }
          
          if (keys['Space']) {
            cameraY += moveSpeed;
          }

          if (keys['ShiftLeft']) {
            cameraY -= moveSpeed;
          }
          
          if (keys['KeyQ']) {
            rotationY -= rotateSpeed;
          }

          if (keys['KeyE']) {
            rotationY += rotateSpeed;
          }
          
          container.style.transform = `translateZ(${-cameraZ}px) translateX(${-cameraX}px) translateY(${-cameraY}px) rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
        }
        
        function animate() {
          updateCamera();
          requestAnimationFrame(animate);
        }
        
        animate();
        
        setTimeout(() => {
          loadingScreen.classList.add('hidden');
        }, 1500);
      });
    </script>
  </body>
</html>
